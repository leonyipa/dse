<!DOCTYPE html>
<html>
<head>
</head>
<body>

<style>
.logo	{
	background-image:url("./img/fox-cartoon.webp");
	width:100px;
	height:100px;
	background-repeat: no-repeat;
	background-size: cover;
	display:inline-block;
}
.mobileFrame {
	background-color:#FFFAEB;
	width:400px;
	height:570px;
	margin:auto;
	
	transform-origin: top;
}
.question{
	margin:12px;padding:8px;background-color:#fff;border-radius:12px;border: 3px solid #ebe6e7;
}

.bubble {
	margin:12px;padding:8px;background-color:#fff;border-radius:12px;border: 3px solid #ebe6e7;
}

.bubble:hover {
	background-color:#F9FAFB; border: 3px solid #D1D5DC; cursor:pointer;
}

.bubble.correct {
	background-color:#F0FDF4; border: 3px solid #05DF72;
}

.bubble.incorrect {
	background-color:#FEF2F2; border: 3px solid #FF6467;
}

.hint{
	font-size: 12px;
	color:#ff6b35;
}

.progressbar {
  background-color: #ebe6e7;
  border-radius: 13px;
  margin:8px 0;
}

.progressbar>div {
  background-color: orange;
  width: 0%;
  height: 10px;
  border-radius: 10px;
}

.hint{
	position:fixed;
	top: 90px;
	
	margin-left:20px;padding:8px;background-color:#fff;border-radius:12px;border: 3px solid #ebe6e7;
}

.hint:hover {
	background-color:#F9FAFB; border: 3px solid #D1D5DC; cursor:pointer;
}

.hintContent {
	width:340px;
}

.next {
	float:right;padding:8px;background-color:orange;border-radius:12px;color:#fff;cursor:pointer;display:none;
}

.next:Hover {
	background-color:#E59100;
}

html,body{
	font-family: Poppins,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
	margin:0;padding:0;
	background-color:#000;
}
html{overflow:hidden;}
</style>

<div id="mobileFrame" class="mobileFrame">
	<div style="padding:20px">
		<div class="logo"></div>
		<div style="display:inline-block; height:100px; vertical-align:top;padding-left: 10px;">
			<p style="color:#1e2939; font-size:24px; margin:0; padding-top:20px;font-weight:700">HKDSE Mathematics</p>
			<p style="color:##4a5565; font-size:16px; margin:0">Chapter 1 - Quadratic Equations<p>
		</div>
		
		<div style="font-weight:700">
		Question <span id="currentQuestion">1</span> of <span id="totalQuestion">3</span>
		</div>
		<div class="progressbar">
			<div id="progressbarFill" style="width:33%"></div>
		</div>
		<div style="font-size: 12px;">
		<span id="progressbarPercentage">33</span>% Complete
		</div>
		
		<div id="question" class="question">
			x²−6x+k=0 has real roots. Find the range of k.
		</div>

		<div class="bubble" id="ans-1" onClick="submitAnswer('1');">
			(A) k <= 9
		</div>
		
		<div class="bubble" id="ans-2" onClick="submitAnswer('2');">
			(B) k <= 8
		</div>
		
		<div class="bubble" id="ans-3" onClick="submitAnswer('3');">
			(C) k <= 7
		</div>
		
		<div class="bubble" id="ans-4" onClick="submitAnswer('4');">
			(D) k <= 6
		</div>
		<div id="next" class="next" onClick="nextQuestion();">
			Next
		</div>
		
	</div>
	
	<div class="hint" onClick="openHint();">💡 Hint?
	
		<div class ="hintContent" id="hintContent" style="display:none;">
		</div>
	</div>
</div>



</div>

</body>
<script>
let openHint = function(){
	if (document.getElementById(`hintContent`).style.display == 'none')
		document.getElementById(`hintContent`).style.display = 'block';
	else
		document.getElementById(`hintContent`).style.display = 'none';
}
let questionData = {
	1:{	question:"x²−6x+k=0 has real roots. Find the range of k.",
		choices:{1:'k <= 9',2:'k <= 8',3:'k <= 7',4:'k <= 6'},
		hintContent:`For a quadratic equation to have real roots, the discriminant must be non-negative. Remember: Δ = b² - 4ac ≥ 0`,
		answer:'1',
		input:''},
	2:{	question:"Express 0.0003052 in scientific notation correct to 3 significant figures.",
		choices:{1:'3.05 x 10⁻⁴',2:'3.05 x 10⁻⁵',3:'3.05 x 10⁻⁶',4:'3.05 x 10⁻⁷'},
		hintContent:`Count the zeros: Move the decimal point for how many times to the right to get 3.052?`,
		answer:'1',
		input:''},
	3:{	question:"If the price of a toy is increased by 20% and then decreased by 20%, what is the percentage change in the price?",
		choices:{1:'4% decrease',2:'4% increase',3:'8% decrease',4:'8% increase'},
		hintContent:`Pick an easy number: Assume the original price is $100.`,
		answer:'1',
		input:''}
}

let submitAnswer = function(value){
	if (questionData[currentQuestion].input !== '')
		return;
	
	if (value === questionData[currentQuestion].answer){ //true
		document.getElementById(`ans-${value}`).className = "bubble correct";
	}
	else{  //false
		document.getElementById(`ans-${questionData[currentQuestion].answer}`).className = "bubble correct";
		document.getElementById(`ans-${value}`).className = "bubble incorrect";
	}
	
	questionData[currentQuestion].input = value;
	
	document.getElementById('next').style.display = 'block';
}

let = currentQuestion = 0;
let nextQuestion = function(){
	if (currentQuestion <= Object.keys(questionData).length - 1)
		currentQuestion += 1;
	else
		currentQuestion = 1;
		
	document.getElementById(`question`).textContent = questionData[currentQuestion].question;
	document.getElementById(`ans-1`).textContent = `(A) ${questionData[currentQuestion].choices[1]}`;
	document.getElementById(`ans-1`).className = `bubble`;
	document.getElementById(`ans-2`).textContent = `(B) ${questionData[currentQuestion].choices[2]}`;
	document.getElementById(`ans-2`).className = `bubble`;
	document.getElementById(`ans-3`).textContent = `(C) ${questionData[currentQuestion].choices[3]}`;
	document.getElementById(`ans-3`).className = `bubble`;
	document.getElementById(`ans-4`).textContent = `(D) ${questionData[currentQuestion].choices[4]}`;
	document.getElementById(`ans-4`).className = `bubble`;
	
	document.getElementById('progressbarPercentage').textContent = Math.round((currentQuestion-1) / Object.keys(questionData).length * 100);
	document.getElementById('progressbarFill').style.width = `${document.getElementById('progressbarPercentage').textContent}%`;
	document.getElementById('currentQuestion').textContent = `${currentQuestion}`;
	document.getElementById('totalQuestion').textContent = `${Object.keys(questionData).length}`;
	document.getElementById('hintContent').textContent = `${questionData[currentQuestion].hintContent}`;
	
	
	document.getElementById('next').style.display = 'none';
	document.getElementById(`hintContent`).style.display = 'none';
	
}
nextQuestion();

let resizePage = function(){
	document.getElementById("mobileFrame").style.transform = `scale(${window.innerHeight/570})`;
}
resizePage();
window.addEventListener('resize', (event) => {
    resizePage();
});
</script>
</html>

</script>
